function dnow(){return new Date(Date.now()+4*3600000);}
var now=dnow();function ymd(d){return d.toISOString().slice(0,10);}var today=ymd(now);
function st(date,hh){var t=new Date(date+'T00:00:00Z');t.setUTCHours(hh);if(t<now)return['done','✓ 완료'];if(date===today)return['now','오늘'];return['soon','예정'];}
var nm={photo:'사진',carousel:'캐러셀',reel:'릴스'};var wd=['일','월','화','수','목','금','토'];
var g=document.getElementById('grid'),done=0;
DATA.forEach(function(e){
  var s=st(e.date,13);if(s[0]==='done')done++;
  var dt=new Date(e.date+'T00:00:00');
  var c=document.createElement('div');c.className='card'+(s[0]==='done'?' done':'');
  c.innerHTML='<span class="badge b-'+s[0]+'">'+s[1]+'</span>'+(e.n>1?'<span class="multi">▦ '+e.n+'</span>':'')+
    '<img class="thumb" loading="lazy" src="'+e.thumb+'">'+
    '<div class="body"><div class="row1"><span class="date">'+e.date.slice(5).replace('-','/')+' ('+wd[dt.getDay()]+')</span><span class="tp">'+nm[e.type]+'</span></div><div class="cap">#'+e.seq+' '+(e.cap||'').replace(/</g,'&lt;')+'</div></div>';
  g.appendChild(c);
});
document.getElementById('sub').innerHTML='매일 13시 · <b style="color:#3ea66a">완료 '+done+'</b> / 전체 '+DATA.length+' · <a href="index.html">오늘 현황</a> · <a href="stories.html">스토리</a>';
