<style>
:root{--bg:#f7f1ec;--card:#fff;--ink:#3a322c;--mut:#a2938a;--line:#ece2d8;--gold:#c0875a;--rose:#cf9a86;--ok:#3ea66a}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,'Segoe UI','Malgun Gothic',sans-serif}

.b-done{background:var(--ok)}.b-now{background:var(--gold)}.b-soon{background:rgba(58,50,44,.5)}
.vb{position:absolute;top:7px;right:7px;font-size:10px;background:rgba(0,0,0,.6);color:#fff;padding:2px 6px;border-radius:6px}
.done .thumb{filter:grayscale(.15)}
.body{padding:8px 10px 10px;display:flex;justify-content:space-between;align-items:center;font-size:12px}
.date{font-weight:800}.slot{font-size:10px;font-weight:700;padding:1px 7px;border-radius:7px;background:#f5e7e0;color:var(--rose)}

function dnow(){var d=new Date();return new Date(d.getTime()+d.getTimezoneOffset()*60000+4*3600000);}
var now=dnow();function ymd(d){return d.toISOString().slice(0,10);}var today=ymd(now);
function st(date,hh){var t=new Date(date+'T00:00:00Z');t.setUTCHours(hh);if(t<now)return['done','✓ 완료'];if(date===today)return['now','오늘'];return['soon','예정'];}
var wd=['일','월','화','수','목','금','토'];
var g=document.getElementById('grid'),done=0;
DATA.forEach(function(e){
  var hh=e.slot==='am'?10:16;var s=st(e.date,hh);if(s[0]==='done')done++;
  var dt=new Date(e.date+'T00:00:00');
  var m=e.vid?'<video class="thumb" src="'+e.thumb+'" muted preload="metadata"></video>':'<img class="thumb" loading="lazy" src="'+e.thumb+'">';
  var c=document.createElement('div');c.className='card'+(s[0]==='done'?' done':'');
  c.innerHTML='<span class="badge b-'+s[0]+'">'+s[1]+'</span>'+(e.vid?'<span class="vb">▶</span>':'')+m+
    '<div class="body"><span class="date">'+e.date.slice(5).replace('-','/')+' ('+wd[dt.getDay()]+')</span><span class="slot">'+(e.slot==='am'?'10시':'16시')+'</span></div>';
  g.appendChild(c);
});
